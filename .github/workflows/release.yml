name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # needed to create the release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Guard: the tag must match package.json so the tarball name is honest.
      - name: Verify tag matches package version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json is $PKG_VERSION but tag is $TAG_VERSION" >&2
            exit 1
          fi

      # Library only — skips the docs site (pages.yml owns that).
      - run: npm run clean && npm run typecheck && npm run build:lib

      - name: Create tarball
        run: npm pack

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            combat-ui-core-*.tgz \
            --title "$GITHUB_REF_NAME" \
            --generate-notes