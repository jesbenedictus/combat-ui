name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # needed to create the release and upload assets
  id-token: write   # needed for npm trusted publishing (OIDC) + provenance

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@combat-ui/core
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      # Guard: the tag must match package.json so the tarball name is honest.
      - name: Verify tag matches package version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json is $PKG_VERSION but tag is $TAG_VERSION" >&2
            exit 1
          fi

      # Library only — skips the docs site (pages.yml owns that).
      - run: npm run clean && npm run typecheck && npm run build:lib

      # Trusted publishing (OIDC) needs npm >= 11.5.1.
      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest

      # Prereleases (e.g. 0.6.0-alpha.1) publish under their prerelease id as
      # the dist-tag (alpha/beta/rc/next/...) so they never become `latest`.
      - name: Determine npm dist-tag
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          PRERELEASE="${PKG_VERSION#*-}"
          if [ "$PRERELEASE" = "$PKG_VERSION" ]; then
            NPM_TAG="latest"
          else
            NPM_TAG="${PRERELEASE%%.*}"
          fi
          echo "Publishing $PKG_VERSION under dist-tag '$NPM_TAG'"
          echo "NPM_TAG=$NPM_TAG" >> "$GITHUB_ENV"

      - name: Publish to npm
        run: npm publish --provenance --access public --tag "$NPM_TAG"

      - name: Create tarball
        run: npm pack

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            combat-ui-core-*.tgz \
            --title "$GITHUB_REF_NAME" \
            --generate-notes